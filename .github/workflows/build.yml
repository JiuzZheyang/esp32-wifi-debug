name: Build ESP32-S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PlatformIO
        run: pip install platformio
      
      - name: Build firmware
        run: |
          cd esp32_wifi_debug
          pio run
      
      - name: Show firmware size
        run: |
          echo "固件大小:"
          ls -lh esp32_wifi_debug/.pio/build/esp32-s3-devkitc-1/firmware.bin
      
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-s3-firmware
          path: esp32_wifi_debug/.pio/build/esp32-s3-devkitc-1/firmware.bin
          retention-days: 30
